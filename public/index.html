<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexura - Core Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .top-nav { align-self: flex-end; padding: 20px; display: flex; gap: 15px; align-items: center; }
        .profile-icon { background: #004a7c; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .main-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-top: -100px; }
        .logo { font-size: 90px; font-weight: 500; color: #004a7c; letter-spacing: -4px; margin-bottom: 30px; }
        .search-wrapper { width: 100%; max-width: 584px; position: relative; }
        .search-main { width: 100%; height: 46px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 50px; font-size: 16px; outline: none; }
        .search-main:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
        .search-icon { position: absolute; left: 18px; top: 12px; color: #9aa0a6; }
        #results-container { width: 100%; max-width: 584px; margin-top: 25px; display: none; }
        .result-card { padding: 15px 20px; border-bottom: 1px solid #f1f3f4; position: relative; }
        .res-url { font-size: 13px; color: #006621; display: block; }
        .res-title { font-size: 19px; color: #1a0dab; text-decoration: none; }
        .res-title:hover { text-decoration: underline; }
        .rank-badge { position: absolute; right: 10px; top: 15px; font-size: 10px; background: #f1f3f4; padding: 2px 8px; border-radius: 10px; color: #5f6368; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="profile-icon">T</div>
    </div>
    <div class="main-container">
        <h1 class="logo">Nexura</h1>
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-main" placeholder="Search Nexura Database...">
        </div>
        <div id="results-container"></div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const container = document.getElementById('results-container');
        let timeout = null;

        input.addEventListener('input', () => {
            clearTimeout(timeout);
            const query = input.value.trim();
            
            if (!query) { 
                container.style.display = 'none'; 
                return; 
            }

            // Debounce lagaya hai taaki har keypress par backend crash na ho
            timeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    render(data);
                } catch (err) {
                    console.error("Search fetch failed", err);
                }
            }, 300);
        });

        function render(data) {
            container.innerHTML = "";
            if(data.length === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'block';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="res-url">${item.display}</span>
                    <a href="${item.source}" class="res-title" target="_blank">${item.name}</a>
                    <span class="rank-badge">P${item.score}</span>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
