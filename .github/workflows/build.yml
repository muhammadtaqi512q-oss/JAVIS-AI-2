name: JAVIS AI 2 Processing Engine
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Automated background checking system (Every Hour)
  workflow_dispatch: # Manual control execution button

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout JAVIS-AI-2 Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Secure Engine Compilers
        run: npm install axios jsdom

      - name: Run JAVIS Core Compiler Engine
        run: node compile.js

      - name: Deploy Shielded Build to Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
