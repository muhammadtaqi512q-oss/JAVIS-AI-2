name: JAVIS-AI-2 Core Engine
on:
  push:
    branches: [ main ] # Jab bhi aap data ya domains file push karenge, backend automatic trigger hoga
  workflow_dispatch: # GitHub dashboard par "Run workflow" ka manual button dega

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Build Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Compilers
        run: npm install jsdom

      - name: Run JAVIS Core Compiler
        run: node compile.js

      - name: Deploy Encrypted Core to Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
