<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVIS AI 2 - Core Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; user-select: none; }
        .main-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-top: -100px; }
        .logo { font-size: 80px; font-weight: 500; color: #004a7c; letter-spacing: -3px; margin-bottom: 25px; }
        .search-wrapper { width: 100%; max-width: 584px; position: relative; }
        .search-main { width: 100%; height: 46px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 50px; font-size: 16px; outline: none; }
        #results-container { width: 100%; max-width: 584px; margin-top: 25px; display: none; }
        .result-card { padding: 15px; border-bottom: 1px solid #f1f3f4; position: relative; }
        .res-title { font-size: 18px; color: #1a0dab; text-decoration: none; font-weight: 500; }
        .rank-badge { position: absolute; right: 10px; top: 15px; font-size: 10px; background: #f1f3f4; padding: 2px 8px; border-radius: 10px; }
    </style>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
        setInterval(() => { debugger; }, 100);
    </script>
</head>
<body>
    <div class="main-container">
        <h1 class="logo">JAVIS</h1>
        <div class="search-wrapper">
            <input type="text" id="search-input" class="search-main" placeholder="Secure Database Access...">
        </div>
        <div id="results-container"></div>
    </div>
    <script>
        const _nxDB = [{"n":"Q09SRSBHUk9VUCBDT01QQU5Z","d":"d3d3LmNnYy5tdA==","s":"aHR0cHM6Ly93d3d6Lm9uZWFwcC5kZXYv","p":1},{"n":"TkVYVVJB","d":"TkVYVVJBLm10","s":"aHR0cHM6Ly9tdWhhbW1hZHRhcWk1MTJxLW9zcy5naXRodWIuaW8vLm10L05FWFVSQQ==","p":1}];
        
        const input = document.getElementById('search-input');
        const container = document.getElementById('results-container');

        input.addEventListener('input', () => {
            const query = input.value.toLowerCase().trim();
            if (!query) { container.style.display = 'none'; return; }
            const filtered = _nxDB.filter(item => atob(item.n).toLowerCase().includes(query) || atob(item.d).toLowerCase().includes(query));
            render(filtered);
        });

        function render(data) {
            container.innerHTML = "";
            if(data.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `<a href="${atob(item.s)}" class="res-title" target="_blank">${atob(item.n)}</a><span class="rank-badge">P${item.p}</span>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
