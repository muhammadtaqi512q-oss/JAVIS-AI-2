<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXURA Core Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        /* Top Navigation */
        .top-nav { align-self: flex-end; padding: 20px; }
        .profile-icon { background: #004a7c; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

        .main-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-top: -120px; }
        
        /* Logo Style */
        .logo { font-size: 90px; font-weight: 500; color: #004a7c; letter-spacing: -4px; margin-bottom: 30px; }
        
        /* Search Box with Icon */
        .search-wrapper { width: 100%; max-width: 584px; position: relative; }
        .search-icon { position: absolute; left: 18px; top: 13px; color: #9aa0a6; font-size: 16px; }
        .search-main { width: 100%; height: 46px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 50px; font-size: 16px; outline: none; }
        .search-main:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: transparent; }

        /* Results Display (Matching Nexura) */
        #results-container { width: 100%; max-width: 584px; margin-top: 25px; display: none; }
        .result-card { padding: 12px 0; border-bottom: 1px solid #f1f3f4; position: relative; }
        .res-url { font-size: 13px; color: #006621; display: block; margin-bottom: 2px; }
        .res-title { font-size: 19px; color: #1a0dab; text-decoration: none; font-weight: 400; }
        .res-title:hover { text-decoration: underline; }
        .rank-badge { position: absolute; right: 0; top: 15px; font-size: 10px; background: #f1f3f4; padding: 2px 8px; border-radius: 10px; color: #70757a; }
    </style>
    <script>
        // Security Shields
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };
        setInterval(() => { debugger; }, 100);
    </script>
</head>
<body>
    <div class="top-nav"><div class="profile-icon">J</div></div>
    
    <div class="main-container">
        <h1 class="logo">NEXURA</h1>
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-main" placeholder="Search JAVIS Database...">
        </div>
        <div id="results-container"></div>
    </div>

    <script>
        const _nxDB = [{"n":"Q09SRSBHUk9VUCBDT01QQU5Z","d":"d3d3LmNnYy5tdA==","s":"aHR0cHM6Ly93d3d6Lm9uZWFwcC5kZXYv","p":1},{"n":"TkVYVVJB","d":"TkVYVVJBLm10","s":"aHR0cHM6Ly9tdWhhbW1hZHRhcWk1MTJxLW9zcy5naXRodWIuaW8vLm10L05FWFVSQQ==","p":1}];
        
        const input = document.getElementById('search-input');
        const container = document.getElementById('results-container');

        input.addEventListener('input', () => {
            const query = input.value.toLowerCase().trim();
            if (!query) { container.style.display = 'none'; return; }

            const filtered = _nxDB.filter(item => {
                const name = atob(item.n).toLowerCase();
                const display = atob(item.d).toLowerCase();
                return name.includes(query) || display.includes(query);
            });

            render(filtered);
        });

        function render(data) {
            container.innerHTML = "";
            if(data.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="res-url">${atob(item.d)}</span>
                    <a href="${atob(item.s)}" class="res-title" target="_blank">${atob(item.n)}</a>
                    <span class="rank-badge">P${item.p}</span>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
